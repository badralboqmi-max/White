<style>
/* CSS for the loader (new design) */
.transition-loader {
  width: 40px;            /* تم التصغير من 80px إلى 40px */
  aspect-ratio: 1;
  padding: 5px;           /* نصف 10px */
  box-sizing: border-box;
  background: #fff;
  display: grid;
  filter: blur(5px) contrast(15) hue-rotate(120deg);
  mix-blend-mode: darken;
}

.transition-loader:before,
.transition-loader:after {
  content: "";
  grid-area: 1/1;
  margin: 2.5px;         /* نصف 5px */
  background: #ff00ff;
}

.transition-loader:after {
  margin: 8.5px;         /* نصف 17px تقريباً */
  animation: loaderAnim 2s infinite;
}

@keyframes loaderAnim {
  12.5% { transform: translate(-60%, 60%); }
  25%   { transform: translate(65%, -65%); }
  37.5% { transform: translate(0, 0); }
  50%   { transform: translate(60%, 60%); }
  67.5% { transform: translate(-65%, -70%); }
  75%   { transform: translate(60%, -60%); }
}
</style>
