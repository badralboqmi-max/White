  <!-- سكربت التحكم في المنيو -->
  <script>
    // زر القائمة وعنصر المنيو والتراكب
    const menuIcon = document.getElementById('menuIcon');
    const menu = document.getElementById('menu');
    const overlay = document.getElementById('overlay');

    // إضافة مستمع الحدث للنقر على الأيقونة
    menuIcon.addEventListener('click', function(event) {
      event.stopPropagation(); // منع انتشار الحدث
      menu.classList.toggle('show');
      overlay.classList.toggle('show');
    });

    // إغلاق المنيو عند النقر في أي مكان آخر
    document.addEventListener('click', function(event) {
      if (!menu.contains(event.target) && !menuIcon.contains(event.target)) {
        menu.classList.remove('show');
        overlay.classList.remove('show');
      }
    });
  </script>

  <!-- سكربت resize -->
  <script>
    const page = {
      width: 393,
      height: 852
    }
    const resizePage = () => {
      const viewWidth = window.innerWidth
      const container = document.getElementById('container')
      const scale = viewWidth / page.width
      const displayHeight = page.height * scale || 0
      document.body.style.paddingTop = displayHeight + 'px'
      container.style.transform = 'scale(' + scale + ')'
      container.style.display = 'block'
    }
    resizePage();
    (function () {
      var throttle = function (type, name, obj) {
        obj = obj || window;
        var running = false;
        var func = function () {
          if (running) { return; }
          running = true;
          requestAnimationFrame(function () {
            obj.dispatchEvent(new CustomEvent(name));
            running = false;
          });
        };
        obj.addEventListener(type, func);
      };
      throttle("resize", "optimizedResize");
    })();
    window.addEventListener("optimizedResize", resizePage);
  </script>
